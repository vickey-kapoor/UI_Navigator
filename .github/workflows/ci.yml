name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Run tests
        env:
          GOOGLE_API_KEY: fake-test-key
          BROWSER_HEADLESS: "true"
        run: pytest tests/ -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install linting tools
        run: pip install ruff

      - name: Run ruff
        run: ruff check src/ tests/ --select E,F,W,I --ignore E501

  e2e-stub-tests:
    name: E2E Stub Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Run E2E stub tests
        env:
          WEBPILOT_STUB: navigate_and_done
          GOOGLE_API_KEY: stub
        run: python tests/agent_runner.py --scenario all | tee e2e-report.json

      - name: Check report passed
        run: |
          python - <<'EOF'
          import json, sys
          report = json.load(open("e2e-report.json"))
          if not report.get("passed"):
              failed = [t for t in report.get("tests", []) if t["status"] != "passed"]
              print("Failed tests:", json.dumps(failed, indent=2))
              sys.exit(1)
          print("All E2E stub tests passed.")
          EOF

      - name: Upload E2E test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-report
          path: e2e-report.json

  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ui-navigator:ci .
