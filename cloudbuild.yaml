################################################################################
# Cloud Build configuration for UI Navigator
#
# Substitution variables (can be overridden on trigger):
#   _REGION        GCP region for Cloud Run (default: us-central1)
#   _SERVICE_NAME  Cloud Run service name  (default: ui-navigator)
#   _REPO_NAME     Artifact Registry repo  (default: ui-navigator)
################################################################################

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: ui-navigator
  _REPO_NAME: ui-navigator
  # Set to "--allow-unauthenticated" to make the Cloud Run service public.
  # Default is private; use the app-level X-API-Key header for client auth.
  _AUTH_FLAG: --no-allow-unauthenticated

steps:
  # ---------------------------------------------------------------------------
  # Step 1: Build the Docker image
  # ---------------------------------------------------------------------------
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/app:$SHORT_SHA
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/app:latest
      - --cache-from
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/app:latest
      - .
    timeout: 900s

  # ---------------------------------------------------------------------------
  # Step 2: Push the image to Artifact Registry
  # ---------------------------------------------------------------------------
  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/app:$SHORT_SHA
    waitFor:
      - build

  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/app:latest
    waitFor:
      - build

  # ---------------------------------------------------------------------------
  # Step 3: Deploy to Cloud Run
  # ---------------------------------------------------------------------------
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/app:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - ${_AUTH_FLAG}
      - --memory=2Gi
      - --cpu=2
      - --concurrency=10
      - --min-instances=0
      - --max-instances=5
      - --timeout=300
      - --set-secrets=GOOGLE_API_KEY=GOOGLE_API_KEY:latest
      - --set-env-vars=BROWSER_HEADLESS=true,LOG_LEVEL=INFO,MAX_CONCURRENT_TASKS=5,BROWSER_WIDTH=1280,BROWSER_HEIGHT=800,RATE_LIMIT_RPM=60
    waitFor:
      - push-sha

# Images to track in the build history
images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/app:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/app:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1200s
