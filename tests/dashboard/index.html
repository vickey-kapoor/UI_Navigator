<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI Navigator Test Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            slate: { 750: '#2a3547' }
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #0f172a; }
    .timeline-line { position: relative; }
    .timeline-line::before {
      content: '';
      position: absolute;
      left: 11px;
      top: 24px;
      bottom: 0;
      width: 2px;
      background: #334155;
    }
    .timeline-line:last-child::before { display: none; }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .fade { transition: all 0.2s ease; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
  </style>
</head>
<body class="text-slate-200 font-sans">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── helpers ──────────────────────────────────────────────────────────────────

function cx(...args) { return args.filter(Boolean).join(' '); }

function Spinner({ size = 4 }) {
  return (
    <svg className={cx(`w-${size} h-${size} spin text-slate-400`)} fill="none" viewBox="0 0 24 24">
      <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
      <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
    </svg>
  );
}

function Badge({ label, color }) {
  const colors = {
    real_bug:        'bg-red-900 text-red-300',
    flaky_assertion: 'bg-amber-900 text-amber-300',
    stub_mismatch:   'bg-blue-900 text-blue-300',
    test_setup_error:'bg-slate-700 text-slate-300',
  };
  return (
    <span className={cx('text-xs font-mono px-2 py-0.5 rounded', colors[label] || 'bg-slate-700 text-slate-300')}>
      {label}
    </span>
  );
}

function Section({ title, headerClass, children, defaultOpen = true }) {
  const [open, setOpen] = useState(defaultOpen);
  return (
    <div className="mb-3">
      <button
        onClick={() => setOpen(o => !o)}
        className={cx('w-full flex items-center justify-between px-3 py-2 rounded text-sm font-semibold', headerClass)}
      >
        <span>{title}</span>
        <span className="text-xs opacity-70">{open ? '▲' : '▼'}</span>
      </button>
      {open && <div className="mt-1">{children}</div>}
    </div>
  );
}

// ── WS timeline chip ──────────────────────────────────────────────────────────

function MsgChip({ msg }) {
  const chip = (type, label, color) => (
    <span className={cx('inline-block text-xs px-2 py-0.5 rounded-full font-medium', color)}>{label}</span>
  );

  if (msg.direction === 'assert') {
    return (
      <div className="ml-7 mt-1 mb-2 text-xs text-slate-500 font-mono">
        {msg.stub_calls?.map((c, i) => (
          <div key={i}>call {c.call_number}: stuck={String(c.stuck)} → {c.returned_action}</div>
        ))}
      </div>
    );
  }

  if (msg.direction === 'http') {
    return (
      <div className="timeline-line flex items-start gap-3 pb-3">
        <div className="w-6 h-6 rounded-full bg-slate-700 flex items-center justify-center flex-shrink-0 mt-0.5">
          <span className="text-xs text-slate-400">H</span>
        </div>
        <div className="text-xs text-slate-400 font-mono mt-1">
          {msg.endpoint}{msg.status ? ` → ${msg.status}` : ''}
        </div>
      </div>
    );
  }

  const typeMap = {
    thinking:             { label: 'Thinking…',        color: 'bg-slate-700 text-slate-300', dot: '●' },
    action:               { label: msg.action_label || msg.action, color: 'bg-blue-900 text-blue-300', dot: '●' },
    confirmation_required:{ label: 'Confirm Required', color: 'bg-amber-900 text-amber-300', dot: '●' },
    done:                 { label: 'Done',             color: 'bg-green-900 text-green-300', dot: '●' },
    stopped:              { label: 'Stopped',          color: 'bg-slate-600 text-slate-300', dot: '●' },
    error:                { label: `Error: ${msg.message || ''}`, color: 'bg-red-900 text-red-300', dot: '●' },
    step_result:          { label: msg.success ? '✓' : '✗', color: msg.success ? 'bg-green-900 text-green-300' : 'bg-red-900 text-red-300', dot: '○' },
    task:                 { label: 'Task sent',        color: 'bg-indigo-900 text-indigo-300', dot: '→' },
    screenshot:           { label: 'Screenshot sent',  color: 'bg-slate-700 text-slate-400', dot: '→' },
    confirm:              { label: msg.confirmed ? 'Confirmed ✓' : 'Denied ✗', color: msg.confirmed ? 'bg-green-900 text-green-300' : 'bg-red-900 text-red-300', dot: '→' },
    interrupt:            { label: `Interrupt${msg.instruction ? ': ' + msg.instruction : ''}`, color: 'bg-purple-900 text-purple-300', dot: '→' },
    stop:                 { label: 'Stop sent',        color: 'bg-slate-600 text-slate-300', dot: '→' },
  };

  const t = typeMap[msg.type] || { label: msg.type, color: 'bg-slate-700 text-slate-400', dot: '●' };
  const dirLabel = msg.direction === 'sent' ? '↑' : msg.direction === 'recv' ? '↓' : '·';

  return (
    <div className="timeline-line flex items-start gap-3 pb-3">
      <div className="w-6 h-6 rounded-full bg-slate-700 border border-slate-600 flex items-center justify-center flex-shrink-0 mt-0.5 text-xs text-slate-400">
        {dirLabel}
      </div>
      <div className="flex flex-col gap-0.5">
        <span className={cx('inline-block text-xs px-2 py-0.5 rounded-full font-medium', t.color)}>{t.label}</span>
        {msg.narration && <span className="text-xs text-slate-500 italic">{msg.narration}</span>}
      </div>
    </div>
  );
}

// ── LEFT COLUMN ───────────────────────────────────────────────────────────────

function TestList({ report, selectedTest, onSelect, polling }) {
  if (!report || report.status === 'no_report_yet') {
    return (
      <div className="flex flex-col items-center justify-center h-48 text-slate-500 text-sm gap-2">
        <span className="text-2xl">📋</span>
        <span>No test results yet.</span>
        <span>Click Run All below.</span>
      </div>
    );
  }

  const tests = report.tests || [];
  const passed = tests.filter(t => t.status === 'passed').length;
  const failed = tests.filter(t => t.status === 'failed').length;
  const errors = tests.filter(t => t.status === 'error').length;

  return (
    <div>
      <div className="flex items-center justify-between mb-1">
        <div className="flex gap-3 text-sm font-semibold">
          <span className="text-green-400">{passed} passed</span>
          {failed > 0 && <span className="text-red-400">{failed} failed</span>}
          {errors > 0 && <span className="text-orange-400">{errors} errors</span>}
        </div>
        {polling && <Spinner size={3} />}
      </div>
      {report.last_run_ts && (
        <div className="text-xs text-slate-500 mb-3">Last run: {report.last_run_ts}</div>
      )}
      <div className="flex flex-col gap-1">
        {tests.map(t => {
          const dot = t.status === 'passed' ? 'bg-green-500' : t.status === 'failed' ? 'bg-red-500' : 'bg-orange-500';
          const isSelected = selectedTest === t.name;
          return (
            <button
              key={t.name}
              onClick={() => onSelect(t.name)}
              className={cx(
                'flex items-center gap-3 px-3 py-2 rounded text-left fade',
                isSelected ? 'bg-slate-700 ring-1 ring-slate-500' : 'hover:bg-slate-800'
              )}
            >
              <span className={cx('w-2.5 h-2.5 rounded-full flex-shrink-0', dot)} />
              <span className="text-sm font-medium flex-1 truncate">{t.name}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ── CENTRE COLUMN ─────────────────────────────────────────────────────────────

function Timeline({ report, selectedTest }) {
  if (!selectedTest) {
    return (
      <div className="flex flex-col items-center justify-center h-48 text-slate-500 text-sm gap-2">
        <span className="text-2xl">↔</span>
        <span>Select a test to see its message sequence</span>
      </div>
    );
  }

  const entry = report?.ws_message_log?.find(e => e.test === selectedTest);
  const msgs = entry?.messages || [];

  return (
    <div>
      <h3 className="text-sm font-semibold text-slate-300 mb-4 truncate">{selectedTest}</h3>
      {msgs.length === 0
        ? <p className="text-xs text-slate-500">No messages recorded for this test.</p>
        : msgs.map((m, i) => <MsgChip key={i} msg={m} />)
      }
    </div>
  );
}

// ── RIGHT COLUMN ──────────────────────────────────────────────────────────────

function CopyPromptBtn({ item }) {
  const [copied, setCopied] = useState(false);
  const copy = () => {
    const text = `---\nImplement this test in tests/test_webpilot_e2e.py:\n\nName: ${item.name}\nScenario: ${item.scenario}\nDescription: ${item.description}\n\nRun it in isolation after implementing to confirm it passes.\n---`;
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };
  return (
    <button
      onClick={copy}
      className="text-xs px-2 py-1 rounded bg-slate-700 hover:bg-slate-600 fade text-slate-300"
    >
      {copied ? 'Copied!' : 'Copy Prompt'}
    </button>
  );
}

function JudgePanel({ judge, polling }) {
  if (!judge || judge.status === 'no_judge_yet') {
    return (
      <div className="flex flex-col items-center justify-center h-48 text-slate-500 text-sm gap-2">
        <span className="text-2xl">⚖️</span>
        <span>Run the judge to see quality analysis.</span>
      </div>
    );
  }

  if (judge.error) {
    return (
      <div className="text-sm text-red-400 px-3 py-2 bg-red-950 rounded">{judge.error}</div>
    );
  }

  const validity   = judge.validity_issues      || [];
  const gaps       = judge.coverage_gaps        || [];
  const diagnoses  = judge.failure_diagnoses    || [];
  const nextTests  = judge.next_tests           || [];

  return (
    <div className="flex flex-col gap-2">
      <Section
        title={`Validity Issues (${validity.length})`}
        headerClass={validity.length > 0 ? 'bg-red-950 text-red-300' : 'bg-green-950 text-green-400'}
      >
        {validity.length === 0
          ? <p className="text-xs text-green-500 px-3 py-1">No validity issues found.</p>
          : validity.map((v, i) => (
            <div key={i} className="px-3 py-2 text-xs border-l-2 border-red-700 ml-2 mb-1">
              <span className="font-semibold text-slate-300">{v.test}</span>
              <p className="text-slate-400 mt-0.5">{v.issue}</p>
            </div>
          ))
        }
      </Section>

      <Section
        title={`Coverage Gaps (${gaps.length})`}
        headerClass={gaps.length > 0 ? 'bg-amber-950 text-amber-300' : 'bg-green-950 text-green-400'}
      >
        {gaps.length === 0
          ? <p className="text-xs text-green-500 px-3 py-1">No coverage gaps found.</p>
          : gaps.map((g, i) => (
            <div key={i} className="flex gap-2 px-3 py-1 text-xs text-slate-400">
              <span className="text-amber-500 flex-shrink-0">•</span>
              <span>{g}</span>
            </div>
          ))
        }
      </Section>

      {diagnoses.length > 0 && (
        <Section
          title={`Failure Diagnoses (${diagnoses.length})`}
          headerClass="bg-slate-700 text-slate-300"
        >
          {diagnoses.map((d, i) => (
            <div key={i} className="px-3 py-2 mb-1">
              <div className="flex items-center gap-2 mb-1">
                <span className="text-xs font-semibold text-slate-300">{d.test}</span>
                <Badge label={d.classification} />
              </div>
              <p className="text-xs text-slate-400">{d.detail}</p>
            </div>
          ))}
        </Section>
      )}

      <Section
        title={`Next Test Suggestions (${nextTests.length})`}
        headerClass="bg-blue-950 text-blue-300"
      >
        {nextTests.length === 0
          ? <p className="text-xs text-slate-500 px-3 py-1">No suggestions.</p>
          : nextTests.map((t, i) => (
            <div key={i} className="bg-slate-800 rounded px-3 py-2 mb-2">
              <div className="flex items-center gap-2 mb-1">
                <span className="text-sm font-semibold text-slate-200">{t.name}</span>
                <span className="text-xs bg-slate-700 text-slate-400 px-2 py-0.5 rounded-full">{t.scenario}</span>
              </div>
              <p className="text-xs text-slate-400 mb-2">{t.description}</p>
              <CopyPromptBtn item={t} />
            </div>
          ))
        }
      </Section>
    </div>
  );
}

// ── TOOLBAR ───────────────────────────────────────────────────────────────────

function Toolbar({ status, onRun, onRunJudge, connected }) {
  return (
    <div className="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-700 px-6 py-3 flex items-center justify-between z-10">
      <div className="flex gap-3">
        <button
          onClick={onRun}
          disabled={status?.runner_running}
          className={cx(
            'flex items-center gap-2 px-4 py-2 rounded text-sm font-medium fade',
            status?.runner_running
              ? 'bg-blue-900 text-blue-400 cursor-not-allowed'
              : 'bg-blue-600 hover:bg-blue-500 text-white'
          )}
        >
          {status?.runner_running && <Spinner size={4} />}
          {status?.runner_running ? 'Running…' : 'Run All Scenarios'}
        </button>
        <button
          onClick={onRunJudge}
          disabled={status?.judge_running}
          className={cx(
            'flex items-center gap-2 px-4 py-2 rounded text-sm font-medium fade',
            status?.judge_running
              ? 'bg-purple-900 text-purple-400 cursor-not-allowed'
              : 'bg-purple-700 hover:bg-purple-600 text-white'
          )}
        >
          {status?.judge_running && <Spinner size={4} />}
          {status?.judge_running ? 'Analysing…' : 'Run Judge'}
        </button>
      </div>
      <div className="flex items-center gap-2 text-sm text-slate-500">
        <span className={cx('w-2 h-2 rounded-full', connected ? 'bg-green-500' : 'bg-red-500')} />
        UI Navigator Test Dashboard
      </div>
    </div>
  );
}

// ── ROOT APP ──────────────────────────────────────────────────────────────────

function App() {
  const [report, setReport]       = useState(null);
  const [judge, setJudge]         = useState(null);
  const [status, setStatus]       = useState(null);
  const [selectedTest, setSelect] = useState(null);
  const [connected, setConnected] = useState(true);
  const [polling, setPolling]     = useState(false);

  const fetchAll = useCallback(async () => {
    setPolling(true);
    try {
      const [r, j, s] = await Promise.all([
        fetch('/report').then(r => r.json()).catch(() => null),
        fetch('/judge').then(r => r.json()).catch(() => null),
        fetch('/status').then(r => r.json()).catch(() => null),
      ]);
      setReport(r);
      setJudge(j);
      setStatus(s);
      setConnected(true);
    } catch {
      setConnected(false);
    } finally {
      setPolling(false);
    }
  }, []);

  useEffect(() => {
    fetchAll();
    const id = setInterval(fetchAll, 3000);
    return () => clearInterval(id);
  }, [fetchAll]);

  const handleRun = async () => {
    await fetch('/run');
    setStatus(s => ({ ...s, runner_running: true }));
  };

  const handleRunJudge = async () => {
    await fetch('/run_judge');
    setStatus(s => ({ ...s, judge_running: true }));
  };

  return (
    <div className="min-h-screen pb-16">
      {/* Header */}
      <div className="bg-slate-800 border-b border-slate-700 px-6 py-3">
        <h1 className="text-lg font-bold text-slate-100">UI Navigator Test Dashboard</h1>
      </div>

      {/* 3-column layout */}
      <div className="flex gap-0 h-[calc(100vh-112px)]">

        {/* LEFT — Test Results */}
        <div className="w-[30%] border-r border-slate-700 flex flex-col">
          <div className="px-4 py-3 border-b border-slate-700 flex items-center justify-between">
            <h2 className="text-sm font-semibold text-slate-400 uppercase tracking-wide">Test Results</h2>
            {polling && <Spinner size={3} />}
          </div>
          <div className="flex-1 overflow-y-auto px-3 py-3">
            <TestList
              report={report}
              selectedTest={selectedTest}
              onSelect={setSelect}
              polling={polling}
            />
          </div>
        </div>

        {/* CENTRE — WS Timeline */}
        <div className="w-[40%] border-r border-slate-700 flex flex-col">
          <div className="px-4 py-3 border-b border-slate-700">
            <h2 className="text-sm font-semibold text-slate-400 uppercase tracking-wide">
              {selectedTest ? 'WS Message Timeline' : 'Select a test'}
            </h2>
          </div>
          <div className="flex-1 overflow-y-auto px-4 py-4">
            <Timeline report={report} selectedTest={selectedTest} />
          </div>
        </div>

        {/* RIGHT — Judge Output */}
        <div className="w-[30%] flex flex-col">
          <div className="px-4 py-3 border-b border-slate-700 flex items-center justify-between">
            <h2 className="text-sm font-semibold text-slate-400 uppercase tracking-wide">Judge Output</h2>
            {status?.judge_running && <Spinner size={3} />}
          </div>
          <div className="flex-1 overflow-y-auto px-3 py-3">
            <JudgePanel judge={judge} polling={status?.judge_running} />
          </div>
        </div>
      </div>

      <Toolbar
        status={status}
        onRun={handleRun}
        onRunJudge={handleRunJudge}
        connected={connected}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
